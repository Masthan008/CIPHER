<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#a38d7c",
              "inverse-primary": "#8f4e00",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#343d96",
              "on-primary": "#4c2700",
              "tertiary": "#46ea70",
              "on-tertiary-fixed": "#002108",
              "tertiary-fixed-dim": "#3ce36a",
              "surface-bright": "#3a3939",
              "secondary": "#bdc2ff",
              "on-error-container": "#ffdad6",
              "tertiary-fixed": "#69ff87",
              "on-primary-container": "#693800",
              "inverse-on-surface": "#313030",
              "surface-container-highest": "#353534",
              "primary": "#ffc08d",
              "on-secondary": "#1b247f",
              "surface-container-low": "#1c1b1b",
              "surface-container": "#201f1f",
              "secondary-container": "#343d96",
              "on-secondary-fixed": "#000767",
              "surface-variant": "#353534",
              "primary-fixed-dim": "#ffb77a",
              "on-primary-fixed-variant": "#6d3a00",
              "primary-fixed": "#ffdcc2",
              "on-tertiary-fixed-variant": "#00531e",
              "on-tertiary": "#003912",
              "outline-variant": "#554336",
              "on-primary-fixed": "#2e1500",
              "on-tertiary-container": "#00501d",
              "on-surface-variant": "#dbc2b0",
              "error-container": "#93000a",
              "surface-tint": "#ffb77a",
              "on-surface": "#e5e2e1",
              "tertiary-container": "#14cd57",
              "error": "#ffb4ab",
              "surface-dim": "#131313",
              "secondary-fixed": "#e0e0ff",
              "on-background": "#e5e2e1",
              "on-secondary-container": "#a8afff",
              "surface": "#131313",
              "background": "#131313",
              "primary-container": "#ff9933",
              "surface-container-lowest": "#0e0e0e",
              "secondary-fixed-dim": "#bdc2ff",
              "inverse-surface": "#e5e2e1",
              "surface-container-high": "#2a2a2a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .circuit-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(147, 0, 10, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .vignette-red {
            background: radial-gradient(circle, transparent 40%, rgba(147, 0, 10, 0.2) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0E0E0E]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#FF9933]" data-icon="lock">lock</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold tracking-tighter text-2xl font-black text-[#FF9933] tracking-[-0.02em]">CIPHER</span>
</div>
<div class="hidden md:flex gap-8">
<span class="text-[#E5E2E1] font-label text-sm hover:text-[#FF9933] transition-colors cursor-pointer">Secure Vault</span>
<span class="text-[#E5E2E1] font-label text-sm hover:text-[#FF9933] transition-colors cursor-pointer">Activity Logs</span>
</div>
</header>
<main class="relative min-h-screen flex items-center justify-center p-6 overflow-hidden">
<div class="absolute inset-0 circuit-bg pointer-events-none"></div>
<div class="absolute inset-0 vignette-red pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(255,153,51,0.03)_0%,transparent_50%)] pointer-events-none"></div>
<div class="relative z-10 max-w-2xl w-full text-center">
<div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-error-container/20 mb-8 border border-error/20">
<span class="material-symbols-outlined text-error text-5xl" style="font-variation-settings: 'FILL' 1;">gpp_maybe</span>
</div>
<h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tight text-on-surface mb-6">
                Access Denied
            </h1>
<div class="bg-surface-container-high/40 backdrop-blur-md p-8 rounded-xl border border-outline-variant/10 shadow-2xl mb-10">
<p class="text-on-surface-variant text-lg md:text-xl leading-relaxed mb-8">
                    Multiple failed login attempts detected. <br class="hidden md:block"/>
                    Security lockout in effect for <span class="text-primary-container font-bold">30 seconds</span>.
                </p>
<div class="flex flex-col items-center gap-2">
<div class="text-7xl md:text-8xl font-headline font-black text-primary-container drop-shadow-[0_0_15px_rgba(255,153,51,0.4)] tracking-tighter">
                        00:29
                    </div>
<div class="w-full max-w-xs h-1 bg-surface-container-highest rounded-full overflow-hidden mt-4">
<div class="h-full bg-primary-container w-[96%] transition-all"></div>
</div>
</div>
</div>
<div class="flex flex-col md:flex-row items-center justify-center gap-4">
<button class="w-full md:w-auto px-8 py-4 bg-surface-container-highest text-on-surface font-semibold rounded-md border border-outline-variant/20 hover:bg-surface-container-high transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-primary-container" data-icon="support_agent">support_agent</span>
                    Emergency Contact
                </button>
<button class="w-full md:w-auto px-8 py-4 text-on-surface-variant font-medium hover:text-on-surface transition-colors">
                    Report Intrusion
                </button>
</div>
</div>
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-6 opacity-40">
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant">Protocol</span>
<span class="text-sm font-mono text-error">ERR_AUTH_MAX_ATTEMPTS</span>
</div>
<div class="w-[1px] h-8 bg-outline-variant/30"></div>
<div class="flex flex-col items-start">
<span class="text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant">Terminal</span>
<span class="text-sm font-mono">NODE_CIPHER_772</span>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full h-1 bg-error-container/20">
<div class="h-full bg-error w-1/3"></div>
</div>
<nav class="fixed bottom-6 w-full z-50 flex justify-around items-center py-4 px-8 bg-[#2A2A2A]/60 backdrop-blur-xl fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-2xl shadow-[0_16px_40px_rgba(0,0,0,0.6)]">
<div class="flex flex-col items-center justify-center text-[#DBC2B0] hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</div>
<div class="flex flex-col items-center justify-center text-[#DBC2B0] hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="search">search</span>
</div>
<div class="flex flex-col items-center justify-center text-[#DBC2B0] hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="folder_lock">lock</span>
</div>
<div class="flex flex-col items-center justify-center text-[#FF9933] drop-shadow-[0_0_8px_rgba(255,153,51,0.5)] active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</nav>
</body></html>

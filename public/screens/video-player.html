<!DOCTYPE html>

<html class="dark" lang="en"><head>

            fontFamily: {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(14, 14, 14, 0.4);
        }
        .neumorphic-control {
            box-shadow: 8px 8px 16px rgba(0,0,0,0.6), -4px -4px 12px rgba(255,255,255,0.05);
        }
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body overflow-hidden h-screen w-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Cinematic Video Surface (Edge-to-Edge) -->
<div class="relative w-full h-full bg-black flex items-center justify-center overflow-hidden">
<img class="absolute inset-0 w-full h-full object-cover opacity-80" data-alt="Cinematic wide shot of a futuristic neon-lit city at night with deep shadows and vibrant orange highlights reflecting off wet pavement" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEWOoVemEMoY_X525igGpHF779Udt8BUegjhxrOnu3J0Iuv1T-4LdRp41fgSeubSATE47xaLDIR3cNqgkJfqVjgtlff-6bmctirwtMgRwlsQfxffvuWYgT4pPyFVnLhTiiMrr8F14EMXxE_KtLJau6jbS4vx25i6xuBkS2T4605jxbonzSzF7VwmtrMfl8K36RB1II1QemxBSb_gL-WknTRKYLTbzsH9NlDK01vJmIYhSYM6Hta5Yd5hL4aAtnsXmJ5guMYvkn5kg"/>
<!-- Overlay Layer: Brightness & Volume Indicators -->
<div class="absolute inset-0 z-10 flex justify-between px-8 py-24 pointer-events-none">
<!-- Left 20% Brightness Bar -->
<div class="w-1.5 h-full bg-surface-container-high/40 rounded-full flex flex-col-reverse overflow-hidden backdrop-blur-sm">
<div class="w-full h-[65%] bg-primary-container shadow-[0_0_15px_rgba(255,153,51,0.5)]"></div>
<div class="absolute -left-10 top-1/2 -translate-y-1/2 rotate-90 flex items-center gap-2 text-primary-container font-bold text-xs tracking-widest uppercase">
<span class="material-symbols-outlined text-sm">light_mode</span>
                    BRIGHTNESS
                </div>
</div>
<!-- Right 20% Volume Bar -->
<div class="w-1.5 h-full bg-surface-container-high/40 rounded-full flex flex-col-reverse overflow-hidden backdrop-blur-sm">
<div class="w-full h-[40%] bg-primary-container shadow-[0_0_15px_rgba(255,153,51,0.5)]"></div>
<div class="absolute -right-10 top-1/2 -translate-y-1/2 -rotate-90 flex items-center gap-2 text-primary-container font-bold text-xs tracking-widest uppercase">
<span class="material-symbols-outlined text-sm">volume_up</span>
                    VOLUME
                </div>
</div>
</div>
<!-- Subtitles: Bottom 10% -->
<div class="absolute bottom-[15%] left-1/2 -translate-x-1/2 z-20 px-6 py-2 bg-black/60 rounded-lg backdrop-blur-md">
<p class="text-white text-lg font-medium tracking-tight text-center">
                This data is encrypted. We are entering the main frame now.
            </p>
</div>
<!-- UI Shell: Top Bar -->
<header class="absolute top-0 left-0 w-full flex justify-between items-center h-20 px-8 z-30 glass-panel">
<div class="flex items-center gap-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all active:scale-90 neumorphic-control">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="overflow-hidden w-64 md:w-96">
<h1 class="font-headline text-xl font-bold tracking-tight text-on-surface marquee">
                        Project_X_Cipher.mp4 • 4K ULTRA HD • HIGH SECURITY STREAM
                    </h1>
</div>
</div>
<div class="flex items-center gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all active:scale-90 neumorphic-control">
<span class="material-symbols-outlined">cast</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all active:scale-90 neumorphic-control">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Center Play/Pause -->
<div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
<button class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container pointer-events-auto shadow-[0_0_40px_rgba(255,153,51,0.4)] active:scale-95 transition-transform neumorphic-control">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
</div>
<!-- Bottom Controls (120dp height) -->
<footer class="absolute bottom-0 left-0 w-full h-[120px] flex flex-col justify-end px-8 pb-6 z-30 glass-panel">
<!-- Seek Bar -->
<div class="relative w-full h-1 bg-surface-container-highest/40 rounded-full mb-8 group cursor-pointer">
<div class="absolute top-0 left-0 h-full w-[45%] bg-primary-container shadow-[0_0_10px_rgba(255,153,51,0.6)]"></div>
<div class="absolute top-1/2 left-[45%] -translate-x-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-primary-container border-4 border-surface-container-lowest shadow-xl scale-0 group-hover:scale-100 transition-transform"></div>
<div class="absolute -top-8 left-[45%] -translate-x-1/2 bg-surface-container-high px-2 py-1 rounded text-[10px] font-bold tracking-widest text-primary-container">
                    12:44 / 28:00
                </div>
</div>
<!-- Controls Row -->
<div class="flex items-center justify-between w-full">
<div class="flex items-center gap-6">
<button class="text-on-surface-variant hover:text-primary-container transition-colors">
<span class="material-symbols-outlined">lock</span>
</button>
<button class="text-on-surface hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-3xl">skip_previous</span>
</button>
<button class="text-on-surface hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-3xl">skip_next</span>
</button>
</div>
<div class="flex items-center gap-8">
<button class="flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all">
<span class="material-symbols-outlined text-xl">closed_caption</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Subtitles</span>
</button>
<button class="flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all">
<span class="material-symbols-outlined text-xl">speed</span>
<span class="text-[10px] font-bold uppercase tracking-widest">1.0x</span>
</button>
<button class="flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high/40 text-on-surface hover:bg-primary-container/20 transition-all">
<span class="material-symbols-outlined text-xl">language</span>
<span class="text-[10px] font-bold uppercase tracking-widest">English</span>
</button>
<button class="text-on-surface hover:text-primary-container transition-colors">
<span class="material-symbols-outlined">fullscreen</span>
</button>
</div>
</div>
</footer>
</div>
<!-- Hidden Platform Navigation (For Contextual Shell Rules) -->
<!-- Suppressed due to Task-Focused/Linear Video Playback Intent -->
</body></html>

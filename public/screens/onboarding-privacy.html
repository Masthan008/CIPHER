<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#a38d7c",
              "inverse-primary": "#8f4e00",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#343d96",
              "on-primary": "#4c2700",
              "tertiary": "#46ea70",
              "on-tertiary-fixed": "#002108",
              "tertiary-fixed-dim": "#3ce36a",
              "surface-bright": "#3a3939",
              "secondary": "#bdc2ff",
              "on-error-container": "#ffdad6",
              "tertiary-fixed": "#69ff87",
              "on-primary-container": "#693800",
              "inverse-on-surface": "#313030",
              "surface-container-highest": "#353534",
              "primary": "#ffc08d",
              "on-secondary": "#1b247f",
              "surface-container-low": "#1c1b1b",
              "surface-container": "#201f1f",
              "secondary-container": "#343d96",
              "on-secondary-fixed": "#000767",
              "surface-variant": "#353534",
              "primary-fixed-dim": "#ffb77a",
              "on-primary-fixed-variant": "#6d3a00",
              "primary-fixed": "#ffdcc2",
              "on-tertiary-fixed-variant": "#00531e",
              "on-tertiary": "#003912",
              "outline-variant": "#554336",
              "on-primary-fixed": "#2e1500",
              "on-tertiary-container": "#00501d",
              "on-surface-variant": "#dbc2b0",
              "error-container": "#93000a",
              "surface-tint": "#ffb77a",
              "on-surface": "#e5e2e1",
              "tertiary-container": "#14cd57",
              "error": "#ffb4ab",
              "surface-dim": "#131313",
              "secondary-fixed": "#e0e0ff",
              "on-background": "#e5e2e1",
              "on-secondary-container": "#a8afff",
              "surface": "#131313",
              "background": "#131313",
              "primary-container": "#ff9933",
              "surface-container-lowest": "#0e0e0e",
              "secondary-fixed-dim": "#bdc2ff",
              "inverse-surface": "#e5e2e1",
              "surface-container-high": "#2a2a2a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-obsidian-gradient {
            background: radial-gradient(circle at center, #1C1B1B 0%, #0E0E0E 100%);
        }
        .saffron-glow {
            box-shadow: 0 0 60px -15px rgba(255, 153, 51, 0.3);
        }
        .saffron-text-glow {
            text-shadow: 0 0 12px rgba(255, 153, 51, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- Header (Suppressed Nav - Task Focused Onboarding) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="lock">lock</span>
<span class="font-headline font-black text-primary-container tracking-[-0.02em] text-xl">CIPHER</span>
</div>
<button class="text-on-surface-variant font-label text-sm font-medium tracking-wide hover:text-on-surface transition-colors">
            SKIP
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- Background Radial Glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px]"></div>
</div>
<!-- Central Illustration -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center mb-12">
<!-- Asymmetrical Decorative Elements -->
<div class="absolute -top-4 -left-4 w-24 h-24 border-t-2 border-l-2 border-primary-container/20 rounded-tl-3xl"></div>
<div class="absolute -bottom-4 -right-4 w-24 h-24 border-b-2 border-r-2 border-primary-container/20 rounded-br-3xl"></div>
<!-- Main Vault Shield -->
<div class="relative z-10 w-64 h-64 bg-surface-container-high rounded-full saffron-glow flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container/10 to-transparent"></div>
<div class="relative">
<span class="material-symbols-outlined text-[120px] text-primary-container saffron-text-glow" data-icon="shield_with_heart" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
</div>
<!-- Floating Data Fragments (Asymmetric Layout) -->
<div class="absolute top-1/4 -right-8 p-3 bg-surface-container/80 backdrop-blur-xl rounded-xl border border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-lg" data-icon="key">key</span>
<span class="text-[10px] font-mono tracking-tighter text-on-surface-variant">AES_256_ACTIVE</span>
</div>
<div class="absolute bottom-1/4 -left-12 p-3 bg-surface-container/80 backdrop-blur-xl rounded-xl border border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary text-lg" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-mono tracking-tighter text-on-surface-variant">NODE_SECURED</span>
</div>
</div>
<!-- Typography Section -->
<div class="text-center max-w-md space-y-4">
<h1 class="font-headline font-bold text-3xl md:text-4xl text-on-surface tracking-tight leading-tight">
                Military-Grade Privacy
            </h1>
<p class="text-on-surface-variant text-base md:text-lg leading-relaxed font-body">
                All your sensitive media is protected by industry-leading AES-256 encryption.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="w-full px-8 py-12 flex flex-col items-center gap-10">
<!-- Navigation Dots -->
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary-container saffron-glow"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Action Area -->
<div class="w-full max-w-sm flex items-center justify-between gap-4">
<button class="flex-1 py-4 px-6 rounded-xl font-label font-semibold text-on-surface-variant hover:text-on-surface transition-all">
                Back
            </button>
<button class="flex-[2] py-4 px-8 bg-gradient-to-br from-primary-container to-on-primary-container rounded-xl font-label font-bold text-on-primary shadow-2xl shadow-primary-container/20 flex items-center justify-center gap-2 group">
<span>Next Step</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Bottom Decorative "Obsidian" Bar -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container/30 to-transparent blur-[2px]"></div>
</body></html>
